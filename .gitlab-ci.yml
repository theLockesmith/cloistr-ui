stages:
  - build
  - publish

variables:
  NODE_VERSION: "22"

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

publish:
  stage: publish
  image: node:${NODE_VERSION}-alpine
  dependencies:
    - build
  script:
    - echo "@cloistr:registry=https://git.aegis-hq.xyz/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//git.aegis-hq.xyz/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish --ignore-scripts
  only:
    - main
    - master
    - tags
